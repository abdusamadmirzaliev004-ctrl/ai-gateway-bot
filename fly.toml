# fly.io config — deploy with:  fly launch --no-deploy ; fly secrets set BOT_TOKEN=... ; fly deploy
app = "ai-gateway-bot"
primary_region = "iad"

[build]

[env]
  WEBAPP_HOST = "0.0.0.0"
  WEBAPP_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
